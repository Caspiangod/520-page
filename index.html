<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#ff7eb3" />
<title>我的整个喜欢</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    font-family: "HarmonyOS Sans SC", "HarmonyOS Sans", "PingFang SC", "Microsoft YaHei", "Source Han Sans CN", "Noto Sans CJK SC", "Songti SC", serif;
    color: #fff;
    cursor: none;
    background: #ffd6e7;
    user-select: none; -webkit-user-select: none;
    touch-action: none;
  }

  /* ===== 多层粉色天空 ===== */
  .sky {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(circle at 20% 20%, #ffd1dc 0%, transparent 40%),
      radial-gradient(circle at 80% 30%, #ffb6c1 0%, transparent 45%),
      radial-gradient(circle at 50% 80%, #ffc8dd 0%, transparent 55%),
      linear-gradient(180deg, #ffe4ef 0%, #ffc1d8 40%, #ff9ec1 75%, #ff7eb3 100%);
    animation: skyShift 18s ease-in-out infinite alternate;
  }
  @keyframes skyShift {
    0%   { filter: hue-rotate(0deg) brightness(1); }
    100% { filter: hue-rotate(-15deg) brightness(1.08); }
  }

  .bokeh {
    position: fixed; inset: 0; z-index: 1;
    pointer-events: none;
    background:
      radial-gradient(circle at 15% 25%, rgba(255,255,255,.6) 0, transparent 2%),
      radial-gradient(circle at 75% 15%, rgba(255,255,255,.4) 0, transparent 3%),
      radial-gradient(circle at 35% 65%, rgba(255,200,220,.5) 0, transparent 2.5%),
      radial-gradient(circle at 85% 75%, rgba(255,255,255,.5) 0, transparent 2%),
      radial-gradient(circle at 55% 45%, rgba(255,220,235,.6) 0, transparent 1.5%);
    filter: blur(2px);
    animation: bokehFloat 12s ease-in-out infinite alternate;
  }
  @keyframes bokehFloat {
    0%   { transform: translateY(0) scale(1); opacity: .8; }
    100% { transform: translateY(-30px) scale(1.05); opacity: 1; }
  }

  canvas { position: fixed; top: 0; left: 0; }
  #stars  { z-index: 2; }
  #hearts { z-index: 3; }
  #petals { z-index: 4; }

  /* ===== 中央舞台 ===== */
  .stage {
    position: relative; z-index: 5;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    pointer-events: none;
    padding: 0 20px;
  }

  .name {
    font-size: 22px;
    letter-spacing: 8px;
    color: #fff;
    text-shadow: 0 0 20px rgba(255,255,255,.9), 0 0 40px #ff7eb3;
    margin-bottom: 8px;
    opacity: 0;
    animation: dropIn 1.5s ease forwards .3s;
  }

  .title {
    font-size: 64px;
    font-weight: 300;
    letter-spacing: 6px;
    background: linear-gradient(90deg, #fff 0%, #ffd6e7 30%, #fff 50%, #ffb6d5 70%, #fff 100%);
    background-size: 200% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 40px rgba(255,255,255,.5);
    animation: shimmer 4s linear infinite, float 5s ease-in-out infinite;
    filter: drop-shadow(0 4px 20px rgba(255,126,179,.6));
  }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .sub {
    margin-top: 18px;
    font-size: 16px;
    letter-spacing: 6px;
    color: #fff7fb;
    text-shadow: 0 0 15px #ff7eb3;
    opacity: 0;
    animation: dropIn 1.5s ease forwards 1s;
  }

  .typing {
    margin-top: 40px;
    font-size: 18px;
    color: #fff;
    min-height: 32px;
    letter-spacing: 3px;
    text-shadow: 0 0 12px rgba(255,255,255,.9), 0 0 24px #ff7eb3;
    font-weight: 300;
    padding: 0 10px;
    max-width: 90vw;
    line-height: 1.6;
  }
  .cursor {
    display: inline-block; width: 2px; height: 18px;
    background: #fff; margin-left: 4px;
    animation: blink .8s steps(1) infinite;
    vertical-align: middle;
    box-shadow: 0 0 8px #fff;
  }

  .question {
    margin-top: 40px;
    font-size: 24px;
    color: #fff;
    opacity: 0;
    transition: opacity 1.5s;
    text-shadow: 0 0 16px rgba(255,255,255,.9), 0 0 32px #ff5b9c;
    letter-spacing: 3px;
    font-weight: 300;
    padding: 0 10px;
  }
  .question.show { opacity: 1; }

  .btns {
    margin-top: 36px;
    display: flex; gap: 30px;
    opacity: 0;
    transition: opacity 1.5s;
    pointer-events: none;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btns.show { opacity: 1; pointer-events: auto; }

  button {
    padding: 14px 40px;
    font-size: 18px;
    border: none; border-radius: 50px;
    cursor: none;
    font-family: inherit;
    letter-spacing: 5px;
    transition: transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s;
  }
  .yes {
    background: linear-gradient(135deg, #ff5b9c, #ffa8c8, #ff5b9c);
    background-size: 200% 100%;
    color: #fff;
    box-shadow: 0 8px 30px rgba(255,91,156,.6), inset 0 1px 0 rgba(255,255,255,.5);
    animation: yesGlow 2s ease-in-out infinite;
  }
  @keyframes yesGlow {
    0%,100% { background-position: 0% 0; box-shadow: 0 8px 30px rgba(255,91,156,.6), inset 0 1px 0 rgba(255,255,255,.5); }
    50%     { background-position: 100% 0; box-shadow: 0 8px 50px rgba(255,91,156,.9), inset 0 1px 0 rgba(255,255,255,.7); }
  }
  .yes:hover, .yes:active { transform: scale(1.12); }
  .no {
    background: rgba(255,255,255,.2);
    color: #fff;
    border: 1px solid rgba(255,255,255,.5);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    position: relative;
  }

  /* ===== 自定义鼠标（桌面） ===== */
  .cursor-dot, .cursor-ring {
    position: fixed; top: 0; left: 0;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
  }
  .cursor-dot {
    width: 20px; height: 20px;
    background: radial-gradient(circle, #fff 0%, #ff8fb1 40%, transparent 70%);
    border-radius: 50%;
    mix-blend-mode: screen;
  }
  .cursor-ring {
    width: 40px; height: 40px;
    border: 1.5px solid rgba(255,255,255,.8);
    border-radius: 50%;
    transition: transform .15s ease-out;
  }

  /* ===== 音乐按钮 ===== */
  .music-btn {
    position: fixed;
    top: max(20px, env(safe-area-inset-top));
    right: max(20px, env(safe-area-inset-right));
    width: 48px; height: 48px;
    border-radius: 50%;
    background: rgba(255,255,255,.25);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    color: #fff;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(255,91,156,.3);
    animation: musicSpin 8s linear infinite;
  }
  .music-btn.paused { animation-play-state: paused; }
  .music-btn svg { width: 22px; height: 22px; }
  @keyframes musicSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  .music-tip {
    position: fixed;
    top: max(20px, env(safe-area-inset-top));
    right: 80px;
    padding: 10px 16px;
    background: rgba(255,255,255,.3);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 24px;
    font-size: 13px;
    color: #fff;
    letter-spacing: 1px;
    z-index: 100;
    white-space: nowrap;
    border: 1px solid rgba(255,255,255,.4);
    opacity: 0;
    transition: opacity .5s;
    text-shadow: 0 1px 4px rgba(255,91,156,.5);
  }
  .music-tip.show { opacity: 1; }

  /* ===== 启动遮罩（用于音频自动播放） ===== */
  .gate {
    position: fixed; inset: 0;
    background: linear-gradient(180deg, #ffe4ef 0%, #ff9ec1 100%);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    transition: opacity 1s, visibility 1s;
  }
  .gate.hide { opacity: 0; visibility: hidden; }
  .gate-heart {
    font-size: 70px; color: #fff;
    text-shadow: 0 0 30px #fff, 0 0 60px #ff5b9c;
    animation: beat 1.2s ease-in-out infinite;
  }
  .gate-text {
    margin-top: 24px;
    font-size: 18px; color: #fff;
    letter-spacing: 6px;
    text-shadow: 0 0 10px #ff5b9c;
  }
  .gate-btn {
    margin-top: 40px;
    padding: 14px 42px;
    background: linear-gradient(135deg, #ff5b9c, #ffa8c8);
    color: #fff; border: none;
    border-radius: 50px;
    font-size: 16px; letter-spacing: 4px;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 8px 30px rgba(255,91,156,.5);
    animation: yesGlow 2s ease-in-out infinite;
  }
  .gate-sub {
    margin-top: 20px; font-size: 12px; color: #fff;
    letter-spacing: 3px; opacity: .8;
  }

  /* ===== 最终告白层 ===== */
  .final {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, rgba(255,255,255,.3), rgba(255,126,179,.95) 60%, rgba(255,91,156,1) 100%);
    display: none;
    align-items: center; justify-content: center;
    flex-direction: column;
    z-index: 20;
    animation: fadeIn 2s ease forwards;
    padding: 20px;
    text-align: center;
  }
  .final .heart-big {
    font-size: 70px;
    color: #fff;
    text-shadow: 0 0 40px #fff, 0 0 80px #ff5b9c;
    animation: beat 1.2s ease-in-out infinite;
  }
  @keyframes beat {
    0%,100% { transform: scale(1); }
    25%     { transform: scale(1.2); }
    50%     { transform: scale(.95); }
    75%     { transform: scale(1.15); }
  }
  .final h1 {
    margin-top: 20px;
    font-size: 56px;
    font-weight: 300;
    background: linear-gradient(90deg, #fff, #ffe1ec, #fff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: 6px;
    text-shadow: 0 0 60px rgba(255,255,255,.8);
    animation: glow 2.5s ease-in-out infinite alternate;
  }
  .final .line {
    margin-top: 20px; font-size: 17px; color: #fff;
    letter-spacing: 4px; opacity: .95;
    text-shadow: 0 0 20px #ff5b9c;
    line-height: 1.6;
  }
  .final .sig {
    margin-top: 50px; font-size: 14px; color: #fff;
    letter-spacing: 3px; opacity: .85;
  }

  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-14px); }
  }
  @keyframes dropIn {
    from { opacity: 0; transform: translateY(-30px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes blink {
    0%,50%   { opacity: 1; }
    51%,100% { opacity: 0; }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: scale(1.1); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes glow {
    from { text-shadow: 0 0 30px #fff, 0 0 60px #ffd1dc; }
    to   { text-shadow: 0 0 60px #fff, 0 0 100px #ff5b9c, 0 0 140px #ff5b9c; }
  }

  .name-tag {
    position: fixed;
    color: #fff;
    font-size: 13px;
    letter-spacing: 3px;
    pointer-events: none;
    z-index: 4;
    text-shadow: 0 0 8px #ff5b9c, 0 0 16px #ff5b9c;
    opacity: 0;
    animation: floatUp 5s linear forwards;
  }
  @keyframes floatUp {
    0%   { opacity: 0; transform: translateY(0) scale(.5); }
    20%  { opacity: 1; transform: translateY(-40px) scale(1); }
    100% { opacity: 0; transform: translateY(-180px) scale(1.2); }
  }

  /* ===== 桌面端放大字体 ===== */
  @media (min-width: 768px) {
    .name    { font-size: 28px; letter-spacing: 12px; }
    .title   { font-size: 84px; letter-spacing: 8px; }
    .sub     { font-size: 18px; letter-spacing: 8px; }
    .typing  { font-size: 22px; letter-spacing: 4px; }
    .cursor  { height: 22px; }
    .question{ font-size: 30px; letter-spacing: 4px; margin-top: 50px; }
    .btns    { gap: 50px; margin-top: 40px; }
    button   { padding: 16px 50px; font-size: 20px; letter-spacing: 6px; }
    .final h1{ font-size: 84px; letter-spacing: 8px; }
    .final .line { font-size: 22px; letter-spacing: 6px; }
    .final .heart-big { font-size: 80px; }
  }

  /* ===== 移动端隐藏自定义鼠标 ===== */
  @media (hover: none) and (pointer: coarse) {
    html, body { cursor: auto; }
    .cursor-dot, .cursor-ring { display: none; }
    button { cursor: pointer; }
    .gate-btn { cursor: pointer; }
    .music-btn { cursor: pointer; }
  }
</style>
</head>
<body>

<!-- 启动遮罩：点击进入（用于触发音频播放） -->
<div class="gate" id="gate">
  <div class="gate-heart">♥</div>
  <button class="gate-btn" id="gateBtn">轻触进入</button>
  <div class="gate-sub">建议开启音量 ♪</div>
</div>

<!-- 背景音乐（请将同目录的歌曲文件命名为 song.mp3） -->
<audio id="bgm" src="https://caspiangod.oss-cn-shanghai.aliyuncs.com/song.mp3"
       loop preload="auto"
       playsinline webkit-playsinline
       x5-playsinline x5-video-player-type="h5-page"
       controlslist="nodownload"></audio>

<!-- 音乐控制按钮 -->
<button class="music-btn paused" id="musicBtn" aria-label="音乐">
  <svg viewBox="0 0 24 24" fill="currentColor">
    <path d="M12 3v10.55A4 4 0 1014 17V7h4V3h-6z"/>
  </svg>
</button>
<div class="music-tip" id="musicTip">♪ Falling You — 曾可妮 / 都智文</div>

<div class="sky"></div>
<div class="bokeh"></div>

<canvas id="stars"></canvas>
<canvas id="hearts"></canvas>
<canvas id="petals"></canvas>

<div class="cursor-ring"></div>
<div class="cursor-dot"></div>

<div class="stage">
  <div class="name">D · I · N · G &nbsp;&nbsp; Y · U · A · N &nbsp;&nbsp; R · O · N · G</div>
  <div class="title">我的整个喜欢</div>
  <div class="sub">— 我所有浪漫的尽头 —</div>

</div>



<script>
/* ========== 设备 & 性能检测 ========== */
const UA = navigator.userAgent || '';
const IS_MOBILE   = window.matchMedia('(hover: none) and (pointer: coarse)').matches;
const IS_HARMONY  = /HarmonyOS|HMSCore|ArkWeb|HUAWEI|HONOR/i.test(UA);
const CORES       = navigator.hardwareConcurrency || 4;
const MEM_GB      = navigator.deviceMemory || 4;
/* 低端机判定：核心数 ≤4 或内存 ≤3GB 视为低端 */
const IS_LOW_END  = CORES <= 4 || MEM_GB <= 3;
/* DPR 控制：低端机最高 1.5x，普通手机 2x，桌面 2x */
const DPR = Math.min(window.devicePixelRatio || 1, IS_LOW_END ? 1.5 : 2);

/* 三档性能：HIGH(桌面) / MID(普通手机) / LOW(低端/鸿蒙老设备) */
const TIER = !IS_MOBILE ? 'HIGH' : (IS_LOW_END ? 'LOW' : 'MID');

const STAR_COUNT   = { HIGH: 200, MID: 100, LOW: 60  }[TIER];
const HEART_COUNT  = { HIGH: 700, MID: 350, LOW: 200 }[TIER];
const PETAL_COUNT  = { HIGH: 60,  MID: 28,  LOW: 18  }[TIER];
const MAX_PARTICLE = { HIGH: 1800,MID: 800, LOW: 500 }[TIER];

/* ========== Canvas 初始化 ========== */
const starsC = document.getElementById('stars');
const sctx   = starsC.getContext('2d');
const heartsC = document.getElementById('hearts');
const hctx    = heartsC.getContext('2d');
const petalsC = document.getElementById('petals');
const pctx    = petalsC.getContext('2d');

function resize(){
  [starsC, heartsC, petalsC].forEach(c=>{
    c.width  = innerWidth  * DPR;
    c.height = innerHeight * DPR;
    c.style.width  = innerWidth  + 'px';
    c.style.height = innerHeight + 'px';
    c.getContext('2d').setTransform(DPR,0,0,DPR,0,0);
  });
}

/* ========== 星点 ========== */
let stars = [], shooting = [];
function initStars(){
  stars = [];
  for(let i=0;i<STAR_COUNT;i++){
    stars.push({
      x: Math.random()*innerWidth,
      y: Math.random()*innerHeight,
      r: Math.random()*1.6+0.3,
      a: Math.random(),
      s: Math.random()*0.02+0.005,
      hue: Math.random() > 0.6 ? 'rgba(255,255,255,' : 'rgba(255,200,225,'
    });
  }
}
function drawStars(){
  sctx.clearRect(0,0,innerWidth,innerHeight);
  stars.forEach(s=>{
    s.a += s.s; if(s.a>1||s.a<0) s.s = -s.s;
    sctx.beginPath();
    sctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    sctx.fillStyle = s.hue + s.a + ')';
    sctx.shadowColor = '#fff';
    sctx.shadowBlur = 6;
    sctx.fill();
  });
  sctx.shadowBlur = 0;

  if(Math.random()<0.012){
    shooting.push({
      x: Math.random()*innerWidth,
      y: 0,
      len: Math.random()*100+50,
      sp:  Math.random()*7+5
    });
  }
  shooting.forEach((m,i)=>{
    const g = sctx.createLinearGradient(m.x,m.y,m.x-m.len,m.y-m.len);
    g.addColorStop(0,'rgba(255,255,255,1)');
    g.addColorStop(.5,'rgba(255,182,210,.8)');
    g.addColorStop(1,'rgba(255,126,179,0)');
    sctx.strokeStyle = g; sctx.lineWidth = 2;
    sctx.beginPath();
    sctx.moveTo(m.x,m.y);
    sctx.lineTo(m.x-m.len, m.y-m.len);
    sctx.stroke();
    m.x += m.sp; m.y += m.sp;
    if(m.y>innerHeight) shooting.splice(i,1);
  });
}

/* ========== 粒子爱心 ========== */
let particles = [];
function heartPoint(t, scale){
  const x = 16*Math.pow(Math.sin(t),3);
  const y = 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
  return { x: x*scale, y: -y*scale };
}
function initHeart(){
  particles = [];
  const cx = innerWidth/2, cy = innerHeight/2;
  const scale = Math.min(innerWidth, innerHeight) / (IS_MOBILE ? 55 : 45);
  for(let i=0;i<HEART_COUNT;i++){
    const t = Math.random()*Math.PI*2;
    const p = heartPoint(t, scale);
    particles.push({
      tx: cx + p.x + (Math.random()-0.5)*10,
      ty: cy + p.y + (Math.random()-0.5)*10,
      x: cx + (Math.random()-.5)*innerWidth*1.2,
      y: cy + (Math.random()-.5)*innerHeight*1.2,
      vx:0, vy:0,
      c: `hsl(${330+Math.random()*30}, 95%, ${72+Math.random()*15}%)`,
      s: Math.random()*1.8+0.6
    });
  }
}
function drawHeart(){
  hctx.fillStyle = 'rgba(255,193,216,0.06)';
  hctx.fillRect(0,0,innerWidth,innerHeight);
  particles.forEach(p=>{
    const dx = p.tx - p.x, dy = p.ty - p.y;
    p.vx = p.vx*0.9 + dx*0.012;
    p.vy = p.vy*0.9 + dy*0.012;
    p.x += p.vx + (Math.random()-0.5)*0.6;
    p.y += p.vy + (Math.random()-0.5)*0.6;
    hctx.beginPath();
    hctx.arc(p.x,p.y,p.s,0,Math.PI*2);
    hctx.fillStyle = p.c;
    hctx.shadowColor = '#ff5b9c';
    hctx.shadowBlur = 8;
    hctx.fill();
  });
  hctx.shadowBlur = 0;
}

/* ========== 樱花花瓣 ========== */
let petals = [];
function initPetals(){
  petals = [];
  for(let i=0;i<PETAL_COUNT;i++){
    petals.push({
      x: Math.random()*innerWidth,
      y: Math.random()*innerHeight,
      r: Math.random()*9+5,
      sp: Math.random()*1.2+0.4,
      ang: Math.random()*Math.PI*2,
      spin: (Math.random()-0.5)*0.025,
      sway: Math.random()*2,
      c: `hsla(${335+Math.random()*25}, 85%, ${78+Math.random()*12}%, ${.7+Math.random()*.3})`
    });
  }
}
function drawSakura(p){
  pctx.save();
  pctx.translate(p.x, p.y);
  pctx.rotate(p.ang);
  pctx.fillStyle = p.c;
  for(let i=0;i<5;i++){
    pctx.rotate((Math.PI*2)/5);
    pctx.beginPath();
    pctx.moveTo(0, 0);
    pctx.bezierCurveTo(p.r*0.3, -p.r*0.5, p.r*0.8, -p.r*0.5, p.r, 0);
    pctx.bezierCurveTo(p.r*0.8, p.r*0.3, p.r*0.3, p.r*0.3, 0, 0);
    pctx.fill();
  }
  pctx.beginPath();
  pctx.arc(0,0,p.r*0.18,0,Math.PI*2);
  pctx.fillStyle = '#fff7';
  pctx.fill();
  pctx.restore();
}
function drawPetals(){
  pctx.clearRect(0,0,innerWidth,innerHeight);
  petals.forEach(p=>{
    p.y += p.sp;
    p.x += Math.sin(p.y*0.008)*p.sway;
    p.ang += p.spin;
    if(p.y>innerHeight+20){ p.y=-20; p.x=Math.random()*innerWidth; }
    drawSakura(p);
  });
}

/* ========== 主循环 ========== */
function loop(){
  drawStars();
  drawHeart();
  drawPetals();
  requestAnimationFrame(loop);
}

resize(); initStars(); initHeart(); initPetals(); loop();
window.addEventListener('resize',()=>{ resize(); initStars(); initHeart(); initPetals(); });
window.addEventListener('orientationchange',()=>{
  setTimeout(()=>{ resize(); initStars(); initHeart(); initPetals(); }, 300);
});



/* ========== 自动定时烟花 ========== */
setInterval(burst, 4000);

/* ========== 烟花 ========== */
function burst(){
  const rounds = { HIGH: 6, MID: 4, LOW: 2 }[TIER];
  const count  = { HIGH: 140, MID: 80, LOW: 50 }[TIER];
  for(let k=0;k<rounds;k++){
    setTimeout(()=>{
      const cx = Math.random()*innerWidth;
      const cy = Math.random()*innerHeight*0.7;
      const hue = 330 + Math.random()*40;
      for(let i=0;i<count;i++){
        const ang = Math.random()*Math.PI*2;
        const sp  = Math.random()*7+2;
        particles.push({
          tx: cx+Math.cos(ang)*220,
          ty: cy+Math.sin(ang)*220,
          x: cx, y: cy,
          vx: Math.cos(ang)*sp,
          vy: Math.sin(ang)*sp,
          c: `hsl(${hue + Math.random()*20},95%,${70+Math.random()*15}%)`,
          s: Math.random()*2.2+1
        });
      }
      if(particles.length>MAX_PARTICLE) particles.splice(0, particles.length - MAX_PARTICLE);
    }, k*350);
  }
}

/* ========== 鼠标 / 触摸效果 ========== */
const dot  = document.querySelector('.cursor-dot');
const ring = document.querySelector('.cursor-ring');
let lastTag = 0;

function trail(x, y){
  if(Math.random()<0.5){
    particles.push({
      tx: x + (Math.random()-0.5)*60,
      ty: y + (Math.random()-0.5)*60,
      x, y,
      vx:(Math.random()-0.5)*2, vy:(Math.random()-0.5)*2,
      c:`hsl(${330+Math.random()*30},95%,80%)`,
      s: Math.random()*1.6+0.5
    });
    if(particles.length>MAX_PARTICLE) particles.splice(0, 80);
  }
  const now = Date.now();
  if(now - lastTag > 800){
    lastTag = now;
    const tag = document.createElement('div');
    tag.className = 'name-tag';
    tag.textContent = ['苑容','♡苑容♡','I ♥ U','520'][Math.floor(Math.random()*4)];
    tag.style.left = (x - 30) + 'px';
    tag.style.top  = y + 'px';
    document.body.appendChild(tag);
    setTimeout(()=>tag.remove(), 5000);
  }
}

if(!IS_MOBILE){
  document.addEventListener('mousemove', e=>{
    dot.style.left = e.clientX+'px';
    dot.style.top  = e.clientY+'px';
    ring.style.left = e.clientX+'px';
    ring.style.top  = e.clientY+'px';
    trail(e.clientX, e.clientY);
  });
  document.addEventListener('mousedown', ()=> ring.style.transform = 'translate(-50%,-50%) scale(.6)');
  document.addEventListener('mouseup',   ()=> ring.style.transform = 'translate(-50%,-50%) scale(1)');
} else {
  document.addEventListener('touchmove', e=>{
    const t = e.touches[0];
    if(t) trail(t.clientX, t.clientY);
  }, {passive:true});
  document.addEventListener('touchstart', e=>{
    const t = e.touches[0];
    if(t) trail(t.clientX, t.clientY);
  }, {passive:true});
}

/* ========== 音乐控制（兼容荣耀/华为/微信 X5 等浏览器） ========== */
const bgm = document.getElementById('bgm');
const musicBtn = document.getElementById('musicBtn');
const musicTip = document.getElementById('musicTip');

bgm.volume = 0.85;

function showTip(ms=2500){
  musicTip.classList.add('show');
  clearTimeout(showTip._t);
  showTip._t = setTimeout(()=> musicTip.classList.remove('show'), ms);
}

let playSucceeded = false;

/* 核心播放函数：必须在用户手势同步调用栈里 */
function tryPlay(){
  /* 荣耀/华为浏览器：先 load() 再 play() 成功率更高 */
  try { bgm.load(); } catch(e){}
  const p = bgm.play();
  if(p && p.then){
    p.then(()=>{
      playSucceeded = true;
      musicBtn.classList.remove('paused');
      showTip();
    }).catch(err=>{
      console.warn('[音乐] 播放失败，等待用户交互重试:', err && err.name);
      musicBtn.classList.add('paused');
      armFallbackUnlock();
    });
  } else {
    /* 老浏览器没有 Promise，假定成功 */
    playSucceeded = true;
    musicBtn.classList.remove('paused');
    showTip();
  }
}

/* 兜底：任何后续用户交互都尝试播放一次（用于荣耀首次 click 不放行的情况） */
let unlockArmed = false;
function armFallbackUnlock(){
  if(unlockArmed) return;
  unlockArmed = true;
  const handler = ()=>{
    if(playSucceeded){ teardown(); return; }
    try { bgm.load(); } catch(e){}
    const p = bgm.play();
    if(p && p.then){
      p.then(()=>{
        playSucceeded = true;
        musicBtn.classList.remove('paused');
        showTip();
        teardown();
      }).catch(()=>{});
    }
  };
  const teardown = ()=>{
    ['touchend','click','pointerup','touchstart'].forEach(ev=>
      document.removeEventListener(ev, handler, true)
    );
  };
  ['touchend','click','pointerup','touchstart'].forEach(ev=>
    document.addEventListener(ev, handler, true)
  );
}

/* 监听音频加载错误（OSS 链接/CORS/网络问题排查用） */
bgm.addEventListener('error', e=>{
  console.error('[音乐] 加载失败:', bgm.error && bgm.error.code, bgm.currentSrc);
});
bgm.addEventListener('playing', ()=>{
  playSucceeded = true;
  musicBtn.classList.remove('paused');
});
bgm.addEventListener('pause', ()=>{
  musicBtn.classList.add('paused');
});

musicBtn.addEventListener('click', e=>{
  e.stopPropagation();
  if(bgm.paused){ tryPlay(); }
  else { bgm.pause(); }
});

/* 启动遮罩：点击/触摸后立即播放 */
const gate = document.getElementById('gate');
const gateBtn = document.getElementById('gateBtn');

function enterStage(e){
  if(e) { e.preventDefault(); e.stopPropagation(); }
  gate.classList.add('hide');
  setTimeout(()=> gate.style.display = 'none', 1000);
  tryPlay();
  showTip(4000);
}
/* 用 pointerup 优先，回退到 click + touchend，确保荣耀触屏也走得通 */
if('PointerEvent' in window){
  gateBtn.addEventListener('pointerup', enterStage);
} else {
  gateBtn.addEventListener('touchend', enterStage, {passive:false});
  gateBtn.addEventListener('click', enterStage);
}
</script>
